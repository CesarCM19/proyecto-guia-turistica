<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Guia Turistica de Costa Rica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/global.css">
    <script type="module" src="components/app-header.js"></script>
</head>

<body>
    <app-header></app-header>

    <main>

        <!-- HERO MAP -->
        <section class="hero-map">
            <img src="assets/img/mapa2.0.png" class="map-img">

            <button class="pin pin-norte">Pacífico Norte</button>
            <button class="pin pin-central">Central</button>
            <button class="pin pin-caribe">Caribe</button>
            <button class="pin pin-sur">Sur</button>

            <div class="search-container">
                <div class="search-bar">
                    <input type="text" placeholder="¿A dónde ir después?">
                    <button>Buscar Tours</button>
                </div>
            </div>
        </section>

        <!-- DESTINOS -->
        <section id="destinos-container" class="destinos-grid"></section>

    </main>

    <script type="module">
        async function renderizar() {
            const res = await fetch('./data/destinos.json');
            const data = await res.json();
            const container = document.getElementById('destinos-container');

            container.innerHTML = data.destinos.map(d => `
                <article class="card">
                    <img src="${d.imagen_portada}" alt="${d.nombre}">
                    <div class="card-content">
                        <h3>${d.nombre}</h3>
                        <p>${d.descripcion}</p>
                    </div>
                </article>
            `).join('');
        }

        renderizar();
    </script>

</body>
</html>
