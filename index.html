<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Guía Turística de Costa Rica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/global.css">

    <script type="module" src="components/app-header.js"></script>
    <script type="module" src="components/destino-card.js"></script>
    <script type="module" src="components/destino-detalle.js"></script>
    <script type="module" src="components/galeria-imagenes.js"></script>
    <script type="module" src="components/audio-guia.js"></script>
</head>

<body>

<app-header></app-header>

<main>
    <div id="vista-lista" class="fade-in">
        <section class="hero-map">
            <img src="assets/img/mapa.jpg" alt="Mapa de Costa Rica" class="map-img">

            <button class="pin pin-norte" aria-label="Pacífico Norte">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                Pacífico Norte
            </button>
            <button class="pin pin-central" aria-label="Central">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 2L1 21h22L12 2zm0 3.83L19.17 19H4.83L12 5.83z"/></svg>
                Central
            </button>
            <button class="pin pin-caribe" aria-label="Caribe">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></svg>
                Caribe
            </button>
            <button class="pin pin-sur" aria-label="Sur / Pacífico Central">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/></svg>
                Sur / Pacífico Central
            </button>

            <div class="search-container">
                <div class="search-bar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#a0aec0" style="margin-right:8px;"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" id="buscador" placeholder="¿A dónde ir después?">
                    <button id="btnBuscar">Buscar Tours</button>
                </div>
            </div>
        </section>

        <div class="section-title">
            <h2 id="titulo-seccion">Destinos Destacados</h2>
            <p>Descubre los lugares más impresionantes de Costa Rica, desde volcanes cubiertos de niebla hasta playas bañadas por el sol.</p>
            <span class="view-all" tabindex="0" aria-label="Ver Todas las Regiones">Ver Todas las Regiones <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 13h11.17l-4.88 4.88c-.39.39-.39 1.03 0 1.42.39.39 1.02.39 1.41 0l6.59-6.59c.39-.39.39-1.02 0-1.41l-6.58-6.6a.996.996 0 10-1.41 1.41L16.17 11H5c-.55 0-1 .45-1 1s.45 1 1 1z"/></svg></span>
        </div>

        <section id="lista" class="destinos-grid"></section>
    </div>

    <section id="detalle" style="display: none;"></section>
</main>

<nav class="bottom-nav">
    <button class="nav-item active" aria-label="Ir a Explorar">
        <svg viewBox="0 0 24 24"><path d="M12 10.9c-.61 0-1.1.49-1.1 1.1s.49 1.1 1.1 1.1c.61 0 1.1-.49 1.1-1.1s-.49-1.1-1.1-1.1zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm2.19 12.19L6 18l3.81-8.19L18 6l-3.81 8.19z"/></svg>
        <span>Explorar</span>
    </button>
    <button class="nav-item" aria-label="Ir a Regiones">
        <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
        <span>Regiones</span>
    </button>
    <button class="nav-item" aria-label="Ir a Audio">
        <svg viewBox="0 0 24 24"><path d="M12 3v9.28c-.47-.17-.97-.28-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z"/></svg>
        <span>Audio</span>
    </button>
    <button class="nav-item" aria-label="Ir a Guardados">
        <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
        <span>Guardados</span>
    </button>
</nav>

<script type="module">
let destinos = [];

async function cargarDatos() {
    const res = await fetch('./data/destinos.json');
    const data = await res.json();
    destinos = data.destinos;
    renderLista(destinos);
}

function renderLista(lista, titulo = 'Destinos Destacados') {
    const cont = document.getElementById('lista');
    const detalle = document.getElementById('detalle');
    const vistaLista = document.getElementById('vista-lista');
    
    document.getElementById('titulo-seccion').textContent = titulo;
    cont.innerHTML = '';
    detalle.style.display = 'none';
    vistaLista.style.display = 'block';

    lista.forEach(d => {
        const card = document.createElement('destino-card');
        card.data = d;
        cont.appendChild(card);
    });
}

function renderDetalle(id) {
    const cont = document.getElementById('detalle');
    const vistaLista = document.getElementById('vista-lista');
    const destino = destinos.find(d => d.id === id);

    vistaLista.style.display = 'none';
    cont.style.display = 'block';
    cont.innerHTML = '';

    const detalle = document.createElement('destino-detalle');
    detalle.data = destino;
    cont.appendChild(detalle);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('hashchange', () => {
    const hash = window.location.hash;
    if (hash.includes('detalle')) {
        const id = hash.replace('#detalle-', '');
        renderDetalle(id);
    } else {
        renderLista(destinos);
    }
});

// Buscador
document.getElementById('btnBuscar').addEventListener('click', () => {
    const texto = document.getElementById('buscador').value.toLowerCase();
    const filtrados = destinos.filter(d =>
        d.nombre.toLowerCase().includes(texto) ||
        d.region.toLowerCase().includes(texto)
    );
    renderLista(filtrados, 'Resultados de Búsqueda');
});

document.addEventListener('click', (e) => {
    if (e.target.closest('.pin')) {
        const pin = e.target.closest('.pin');
        const region = pin.textContent.trim();
        const filtrados = destinos.filter(d =>
            d.region.toLowerCase().includes(region.toLowerCase())
        );
        renderLista(filtrados, 'Región ' + region);
        
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item')[1].classList.add('active');
    }
});

document.querySelectorAll('.nav-item').forEach((btn, index) => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        if (index === 0) {
            window.location.hash = '';
            renderLista(destinos);
        } else if (index === 1) {
            window.location.hash = '';
            renderLista(destinos, 'Todas las Regiones');
        } else if (index === 2) {
            alert('Módulo de Audio general en construcción (Fase 3)');
        } else if (index === 3) {
            alert('Módulo de Favoritos en construcción (Fase 3)');
        }
    });
});

cargarDatos();
</script>
</body>
</html>
